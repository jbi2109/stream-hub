<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:">
  <title>Stream Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <h1>Stream Hub</h1>

    <div class="nav">
      <button id="browse-btn">&#128269; Browse</button>
      <button id="home-btn">&#127909; Library</button>
    </div>

    <h2>Sources</h2>
    <div id="sources"></div>
    <form id="add-source">
      <input id="src-name" placeholder="Name" required>
      <input id="src-url" placeholder="https://site.com" required>
      <input id="src-template" title="Paste the site's own embed URL using {id} {season} {episode} tokens; movies auto-trim season/episode" placeholder="Embed pattern (optional): {origin}/embed/{type}/{id}/{season}/{episode}">
      <select id="src-cat">
        <option value="vod">Movies / TV Shows</option>
        <option value="anime">Anime</option>
        <option value="live">Live TV</option>
      </select>
      <button type="submit">+ Add source</button>
    </form>

    <h2>Settings</h2>
    <input id="tmdb-key" placeholder="TMDB API key (for Browse)">
  </div>

  <div id="content">
    <div id="topbar">
      <button id="back" title="Back">&#8592;</button>
      <button id="forward" title="Forward">&#8594;</button>
      <button id="src-home" title="Source home">&#8962;</button>
      <span id="address"></span>
      <select id="src-switch" title="Switch source" hidden></select>
      <button id="watch-later" title="Add this to Watch Later">+ Watch Later</button>
    </div>
    <div id="view">
      <div id="browse"></div>
      <div id="detail" hidden></div>
      <div id="home" hidden></div>
      <webview id="webview" allowpopups hidden></webview>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:">
  <title>Stream Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <h1>Stream Hub</h1>

    <div class="nav">
      <button id="browse-btn">&#128269; Browse</button>
      <button id="home-btn">&#127909; Library</button>
    </div>

    <h2>Settings</h2>
    <input id="tmdb-key" placeholder="TMDB API key (for Browse)">
    <div id="default-player-row" hidden>
      <label for="default-source">Default player</label>
      <select id="default-source"></select>
    </div>

    <h2>Players &amp; Sources</h2>
    <div id="sources"></div>
    <button id="add-source-btn" class="add-btn">+ Add player / source</button>
  </div>

  <div id="content">
    <div id="topbar">
      <button id="back" title="Back">&#8592;</button>
      <button id="forward" title="Forward">&#8594;</button>
      <button id="src-home" title="Source home">&#8962;</button>
      <span id="address"></span>
      <select id="src-switch" title="Switch source" hidden></select>
      <button id="watch-later" title="Add this to Watch Later">+ Watch Later</button>
    </div>
    <div id="view">
      <div id="browse"></div>
      <div id="detail" hidden></div>
      <div id="home" hidden></div>
      <webview id="webview" allowpopups hidden></webview>
    </div>
  </div>

  <div id="wizard" hidden></div>

  <script src="renderer.js"></script>
</body>
</html>

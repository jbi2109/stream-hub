<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:">
  <title>Stream Hub</title>
  <!-- pre-paint theme apply (before the stylesheet) so there's no flash -->
  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="rail">
    <div class="rail-top">
      <button id="dash-btn" class="rail-btn" title="Home">&#127968;</button>
      <button id="home-btn" class="rail-btn" title="Library">&#128269;</button>
      <button id="browse-btn" class="rail-btn" title="Movies/TV Shows">&#127909;</button>
      <button id="live-btn" class="rail-btn" title="Live TV">&#128250;</button>
      <button id="youtube-btn" class="rail-btn" title="YouTube">&#9654;</button>
      <button id="resume-btn" class="rail-btn" title="Resume watching" hidden>&#9199;</button>
    </div>
    <button id="settings-btn" class="rail-btn rail-settings" title="Settings">&#9881;</button>
  </div>

  <div id="content">
    <div id="topbar">
      <button id="back" title="Back">&#8592;</button>
      <button id="forward" title="Forward">&#8594;</button>
      <button id="src-home" title="Source home">&#8962;</button>
      <span id="address"></span>
      <select id="ep-switch" title="Switch episode" hidden></select>
      <button id="autonext-btn" title="Auto-play next episode" hidden>&#9197;</button>
      <select id="src-switch" title="Switch source" hidden></select>
      <button id="live-sources" title="Choose a source" hidden>&#8646; Sources</button>
      <button id="watch-later" title="Add this to Watch Later">+ Watch Later</button>
    </div>
    <div id="view">
      <div id="dashboard" hidden></div>
      <div id="browse"></div>
      <div id="detail" hidden></div>
      <div id="home" hidden></div>
      <div id="settings" hidden></div>
      <webview id="webview" allowpopups hidden></webview>
      <button id="sources-overlay" title="Choose a source" hidden>&#8646; Sources</button>
    </div>
  </div>

  <div id="wizard" hidden></div>
  <div id="update-banner" hidden></div>

  <!-- classic scripts sharing one global scope; load order: core first, settings before app, app (bootstrap) last -->
  <script src="core.js"></script>
  <script src="media.js"></script>
  <script src="sources.js"></script>
  <script src="browse.js"></script>
  <script src="live.js"></script>
  <script src="detail.js"></script>
  <script src="library.js"></script>
  <script src="dashboard.js"></script>
  <script src="wizard.js"></script>
  <script src="settings.js"></script>
  <script src="keyboard.js"></script>
  <script src="app.js"></script>
</body>
</html>

name: Release

# Build the Windows installer and publish it to a GitHub Release when a version tag is pushed.
# Runs from a clean clone, so the release binary ships no user data / no providers.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # electron-builder spins up one publisher per artifact; if the release doesn't
      # exist yet they race to POST /releases and one 422s ("already_exists"), killing
      # the upload mid-flight. Pre-creating the release makes both publishers GET it.
      - name: Pre-create release (prevents electron-builder create race)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) { gh release create $tag --title $tag --notes "Automated release. See assets below." }
      - name: Build and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
